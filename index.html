<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      overflow: hidden;
    }
    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
    }
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }
    #tooltip {
      position: fixed;
      display: none;
      background: white;
      border: 0.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 14px;
      max-width: 280px;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #tooltip .t-title   { font-size: 13px; font-weight: 500; color: #1a1a1a; line-height: 1.5; margin-bottom: 4px; }
    #tooltip .t-meta    { font-size: 11px; color: #888; }
    #tooltip .t-cluster { font-size: 11px; color: #555; margin-top: 4px; font-style: italic; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui-overlay"></div>
  <div id="tooltip">
    <div class="t-title"   id="tt-title"></div>
    <div class="t-meta"    id="tt-meta"></div>
    <div class="t-cluster" id="tt-cluster"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf9f9f7);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 20);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.enablePan     = true;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  const CLUSTER_COLORS = [
    '#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f',
    '#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac',
    '#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd',
    '#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf',
    '#aec7e8','#ffbb78','#98df8a','#ff9896','#c5b0d5',
    '#c49c94','#f7b6d2'
  ];
  const NOISE_COLOR = '#cccccc';

  const raycaster = new THREE.Raycaster();
  raycaster.params.Points.threshold = 0.15;
  const mouse = new THREE.Vector2();

  const tooltip   = document.getElementById('tooltip');
  const ttTitle   = document.getElementById('tt-title');
  const ttMeta    = document.getElementById('tt-meta');
  const ttCluster = document.getElementById('tt-cluster');

  let allPoints = [];

  // draw a soft circle sprite on a canvas and use it as a texture
  function makeCircleTexture() {
    const size = 64;
    const canvas = document.createElement('canvas');
    canvas.width  = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const half = size / 2;
    const gradient = ctx.createRadialGradient(half, half, 0, half, half, half);
    gradient.addColorStop(0.0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.4, 'rgba(255,255,255,1)');
    gradient.addColorStop(1.0, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(half, half, half, 0, Math.PI * 2);
    ctx.fill();
    return new THREE.CanvasTexture(canvas);
  }

  fetch('data/news_map.json')
    .then(r => r.json())
    .then(data => {
      window.newsData = data;
      allPoints = data.points;
      drawPoints(data.points);
      centerCamera();
    });

  function drawPoints(points) {
    const geometry  = new THREE.BufferGeometry();
    const positions = new Float32Array(points.length * 3);
    const colors    = new Float32Array(points.length * 3);

    points.forEach((p, i) => {
      positions[i * 3]     = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;

      const hex = p.cluster === -1 ? NOISE_COLOR : CLUSTER_COLORS[p.cluster % CLUSTER_COLORS.length];
      const c   = new THREE.Color(hex);
      colors[i * 3]     = c.r;
      colors[i * 3 + 1] = c.g;
      colors[i * 3 + 2] = c.b;
    });

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size:         0.18,
      vertexColors: true,
      sizeAttenuation: true,
      map:          makeCircleTexture(),
      transparent:  true,
      alphaTest:    0.05,
      depthWrite:   false,
    });

    const pointCloud = new THREE.Points(geometry, material);
    scene.add(pointCloud);
    window.pointCloud = pointCloud;
  }

  function centerCamera() {
    const box    = new THREE.Box3().setFromObject(window.pointCloud);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    const dist   = Math.max(size.x, size.y, size.z) * 1.5;
    camera.position.set(center.x, center.y, center.z + dist);
    camera.lookAt(center);
    controls.target.copy(center);
    controls.update();
    window.sceneCenter = center;
  }

  window.addEventListener('mousemove', e => {
    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(window.pointCloud);

    if (hits.length > 0) {
      const idx = hits[0].index;
      const p   = allPoints[idx];
      const clusterLabel = p.cluster === -1
        ? 'noise'
        : window.newsData.clusters[p.cluster];

      ttTitle.textContent   = p.title;
      ttMeta.textContent    = `${p.date.slice(0, 10)} — ${p.source}`;
      ttCluster.textContent = clusterLabel;

      tooltip.style.display = 'block';
      tooltip.style.left    = (e.clientX + 14) + 'px';
      tooltip.style.top     = (e.clientY - 10) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
