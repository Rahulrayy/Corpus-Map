<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      overflow: hidden;
    }
    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
    }
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }
    #disclaimer {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 0.5px solid #e0e0e0;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      color: #888;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      z-index: 100;
    }
    #tooltip {
      position: fixed;
      display: none;
      background: white;
      border: 0.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 14px;
      max-width: 280px;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #tooltip .t-title   { font-size: 13px; font-weight: 500; color: #1a1a1a; line-height: 1.5; margin-bottom: 4px; }
    #tooltip .t-meta    { font-size: 11px; color: #888; }
    #tooltip .t-cluster { font-size: 11px; color: #555; margin-top: 4px; font-style: italic; }

    #legend {
      position: fixed;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      background: white;
      border: 0.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px 16px;
      max-height: 80vh;
      overflow-y: auto;
      width: 210px;
      pointer-events: all;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    #legend h3 {
      font-size: 11px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .legend-item:hover  { background: #f3f3f0; }
    .legend-item.active { background: #f3f3f0; }
    .legend-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 12px; color: #333; line-height: 1.4; }
    .legend-count { font-size: 11px; color: #aaa; margin-left: auto; flex-shrink: 0; }
    #legend-reset {
      margin-top: 10px;
      width: 100%;
      font-size: 12px;
      padding: 6px;
      border: 0.5px solid #e0e0e0;
      border-radius: 6px;
      background: white;
      color: #555;
      cursor: pointer;
    }
    #legend-reset:hover { background: #f3f3f0; }
    #legend::-webkit-scrollbar       { width: 4px; }
    #legend::-webkit-scrollbar-track { background: transparent; }
    #legend::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    #timeline {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 0.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px 20px;
      width: 520px;
      pointer-events: all;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    #timeline h3 {
      font-size: 11px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      text-align: center;
    }
    #timeline-slider  { width: 100%; accent-color: #4e79a7; }
    #timeline-labels  { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-top: 6px; }
    #timeline-current { text-align: center; font-size: 12px; color: #555; margin-top: 4px; }

    #sidebar {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 280px;
      background: white;
      border: 0.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px;
      pointer-events: all;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      display: none;
    }
    #sidebar-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }
    #sidebar-title {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.4;
    }
    #sidebar-close {
      font-size: 16px;
      color: #aaa;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
    }
    #sidebar-close:hover { color: #555; }
    #sidebar-meta {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 14px;
    }
    .sidebar-article {
      padding: 10px 0;
      border-top: 0.5px solid #f0f0f0;
    }
    .sidebar-article a {
      font-size: 13px;
      color: #1a1a1a;
      text-decoration: none;
      line-height: 1.5;
      display: block;
      margin-bottom: 3px;
    }
    .sidebar-article a:hover { color: #4e79a7; }
    .sidebar-article-meta { font-size: 11px; color: #aaa; }
    #sidebar::-webkit-scrollbar       { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui-overlay"></div>

  <div id="disclaimer">
    articles are from 2018 — some links may no longer be active
  </div>

  <div id="tooltip">
    <div class="t-title"   id="tt-title"></div>
    <div class="t-meta"    id="tt-meta"></div>
    <div class="t-cluster" id="tt-cluster"></div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title"></div>
      <button id="sidebar-close">x</button>
    </div>
    <div id="sidebar-meta"></div>
    <div id="sidebar-articles"></div>
  </div>

  <div id="legend">
    <h3>topics</h3>
    <div id="legend-items"></div>
    <button id="legend-reset">show all</button>
  </div>

  <div id="timeline">
    <h3>filter by date</h3>
    <input type="range" id="timeline-slider" min="1" max="365" value="365" step="1" />
    <div id="timeline-labels">
      <span>Jan 2018</span>
      <span>Jul 2018</span>
    </div>
    <div id="timeline-current">showing all dates</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf9f9f7);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 20);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.enablePan     = true;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  const CLUSTER_COLORS = [
    '#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f',
    '#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac',
    '#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd',
    '#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf',
    '#aec7e8','#ffbb78','#98df8a','#ff9896','#c5b0d5',
    '#c49c94','#f7b6d2'
  ];
  const NOISE_COLOR = '#cccccc';

  const raycaster = new THREE.Raycaster();
  raycaster.params.Points.threshold = 0.15;
  const mouse = new THREE.Vector2();

  const tooltip   = document.getElementById('tooltip');
  const ttTitle   = document.getElementById('tt-title');
  const ttMeta    = document.getElementById('tt-meta');
  const ttCluster = document.getElementById('tt-cluster');

  const sidebar         = document.getElementById('sidebar');
  const sidebarTitle    = document.getElementById('sidebar-title');
  const sidebarMeta     = document.getElementById('sidebar-meta');
  const sidebarArticles = document.getElementById('sidebar-articles');

  let allPoints     = [];
  let activeCluster = null;
  let maxDay        = 365;
  let mouseDownPos  = { x: 0, y: 0 };

  function makeCircleTexture() {
    const size   = 64;
    const canvas = document.createElement('canvas');
    canvas.width  = size;
    canvas.height = size;
    const ctx  = canvas.getContext('2d');
    const half = size / 2;
    const gradient = ctx.createRadialGradient(half, half, 0, half, half, half);
    gradient.addColorStop(0.0,  'rgba(255,255,255,1)');
    gradient.addColorStop(0.85, 'rgba(255,255,255,1)');
    gradient.addColorStop(1.0,  'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(half, half, half, 0, Math.PI * 2);
    ctx.fill();
    return new THREE.CanvasTexture(canvas);
  }

  fetch('data/news_map.json')
    .then(r => r.json())
    .then(data => {
      window.newsData = data;
      allPoints = data.points;
      maxDay    = Math.max(...allPoints.map(p => p.day));
      document.getElementById('timeline-slider').max   = maxDay;
      document.getElementById('timeline-slider').value = maxDay;
      drawPoints(data.points);
      centerCamera();
      buildLegend(data);
      buildTimeline();
    });

  function drawPoints(points) {
    const geometry  = new THREE.BufferGeometry();
    const positions = new Float32Array(points.length * 3);
    const colors    = new Float32Array(points.length * 3);

    points.forEach((p, i) => {
      positions[i * 3]     = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;

      const hex = p.cluster === -1 ? NOISE_COLOR : CLUSTER_COLORS[p.cluster % CLUSTER_COLORS.length];
      const c   = new THREE.Color(hex);
      colors[i * 3]     = c.r;
      colors[i * 3 + 1] = c.g;
      colors[i * 3 + 2] = c.b;
    });

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size:            0.18,
      vertexColors:    true,
      sizeAttenuation: true,
      map:             makeCircleTexture(),
      transparent:     true,
      alphaTest:       0.05,
      depthWrite:      false,
    });

    const pointCloud = new THREE.Points(geometry, material);
    scene.add(pointCloud);
    window.pointCloud = pointCloud;
  }

  function centerCamera() {
    const box    = new THREE.Box3().setFromObject(window.pointCloud);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    const dist   = Math.max(size.x, size.y, size.z) * 1.5;
    camera.position.set(center.x, center.y, center.z + dist);
    camera.lookAt(center);
    controls.target.copy(center);
    controls.update();
    window.sceneCenter = center;
  }

  function buildLegend(data) {
    const container = document.getElementById('legend-items');
    const counts    = {};
    allPoints.forEach(p => {
      if (p.cluster === -1) return;
      counts[p.cluster] = (counts[p.cluster] || 0) + 1;
    });

    Object.entries(data.clusters).forEach(([id, label]) => {
      if (parseInt(id) === -1) return;
      const item  = document.createElement('div');
      item.className       = 'legend-item';
      item.dataset.cluster = id;

      const dot   = document.createElement('div');
      dot.className        = 'legend-dot';
      dot.style.background = CLUSTER_COLORS[parseInt(id) % CLUSTER_COLORS.length];

      const lbl   = document.createElement('span');
      lbl.className   = 'legend-label';
      lbl.textContent = label;

      const count = document.createElement('span');
      count.className   = 'legend-count';
      count.textContent = counts[id] || 0;

      item.appendChild(dot);
      item.appendChild(lbl);
      item.appendChild(count);
      item.addEventListener('click', () => {
        highlightCluster(parseInt(id), item);
        openSidebar(parseInt(id), label, data);
      });
      container.appendChild(item);
    });

    document.getElementById('legend-reset').addEventListener('click', () => {
      resetHighlight();
      closeSidebar();
    });
  }

  function buildTimeline() {
    const slider  = document.getElementById('timeline-slider');
    const current = document.getElementById('timeline-current');

    slider.addEventListener('input', () => {
      const day     = parseInt(slider.value);
      const date    = dayToDate(day);
      const dateStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      current.textContent = day === maxDay ? 'showing all dates' : `up to ${dateStr}`;
      applyFilters(day, activeCluster);
    });
  }

  function dayToDate(day) {
    const d = new Date(2018, 0, 1);
    d.setDate(d.getDate() + day - 1);
    return d;
  }

  function applyFilters(maxDayFilter, clusterId) {
    const colors = window.pointCloud.geometry.attributes.color;
    allPoints.forEach((p, i) => {
      const inDate    = p.day <= maxDayFilter;
      const inCluster = clusterId === null || p.cluster === clusterId;
      if (inDate && inCluster) {
        const hex = p.cluster === -1 ? NOISE_COLOR : CLUSTER_COLORS[p.cluster % CLUSTER_COLORS.length];
        const c   = new THREE.Color(hex);
        colors.setXYZ(i, c.r, c.g, c.b);
      } else {
        colors.setXYZ(i, 0.88, 0.88, 0.88);
      }
    });
    colors.needsUpdate = true;
  }

  function highlightCluster(clusterId, itemEl) {
    if (activeCluster === clusterId) {
      resetHighlight();
      closeSidebar();
      return;
    }
    activeCluster = clusterId;
    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
    itemEl.classList.add('active');
    const day = parseInt(document.getElementById('timeline-slider').value);
    applyFilters(day, activeCluster);
  }

  function resetHighlight() {
    activeCluster = null;
    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
    const day = parseInt(document.getElementById('timeline-slider').value);
    applyFilters(day, null);
  }

  function openSidebar(clusterId, label, data) {
    const color    = CLUSTER_COLORS[clusterId % CLUSTER_COLORS.length];
    const articles = allPoints
      .filter(p => p.cluster === clusterId)
      .sort((a, b) => new Date(a.date) - new Date(b.date))
      .slice(0, 8);

    sidebarTitle.innerHTML  = `<span style="background:${color}; display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle;"></span>${label}`;
    sidebarMeta.textContent = `${articles.length} of ${allPoints.filter(p => p.cluster === clusterId).length} articles`;

    sidebarArticles.innerHTML = '';
    articles.forEach(p => {
      const div  = document.createElement('div');
      div.className = 'sidebar-article';

      const a    = document.createElement('a');
      a.href        = p.url;
      a.target      = '_blank';
      a.textContent = p.title;

      const meta = document.createElement('div');
      meta.className   = 'sidebar-article-meta';
      meta.textContent = `${p.date.slice(0, 10)} — ${p.source}`;

      div.appendChild(a);
      div.appendChild(meta);
      sidebarArticles.appendChild(div);
    });

    sidebar.style.display = 'block';
  }

  function closeSidebar() {
    sidebar.style.display = 'none';
  }

  document.getElementById('sidebar-close').addEventListener('click', () => {
    closeSidebar();
    resetHighlight();
  });

  renderer.domElement.addEventListener('mousedown', e => {
    mouseDownPos = { x: e.clientX, y: e.clientY };
  });

  renderer.domElement.addEventListener('mouseup', e => {
    const dx = Math.abs(e.clientX - mouseDownPos.x);
    const dy = Math.abs(e.clientY - mouseDownPos.y);
    if (dx > 4 || dy > 4) return;

    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(window.pointCloud);

    if (hits.length > 0) {
      const p = allPoints[hits[0].index];
      if (p.cluster === -1) return;
      const label  = window.newsData.clusters[p.cluster];
      const itemEl = document.querySelector(`.legend-item[data-cluster="${p.cluster}"]`);
      highlightCluster(p.cluster, itemEl);
      openSidebar(p.cluster, label, window.newsData);
    }
  });

  window.addEventListener('mousemove', e => {
    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(window.pointCloud);

    if (hits.length > 0) {
      const idx = hits[0].index;
      const p   = allPoints[idx];
      const clusterLabel = p.cluster === -1 ? 'noise' : window.newsData.clusters[p.cluster];

      ttTitle.textContent   = p.title;
      ttMeta.textContent    = `${p.date.slice(0, 10)} — ${p.source}`;
      ttCluster.textContent = clusterLabel;

      tooltip.style.display = 'block';
      tooltip.style.left    = (e.clientX + 14) + 'px';
      tooltip.style.top     = (e.clientY - 10) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
